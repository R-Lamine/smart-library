version: "3.8"

services:
  # =====================
  # LARAVEL (BACK + FRONT)
  # =====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biblio-app
    ports:
      - "8000:8000"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
      - ollama
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=bibliotheque
      - DB_USERNAME=biblio_user
      - DB_PASSWORD=biblio_pass
      - OLLAMA_HOST=http://ollama:11434
    command: >
      sh -c "
        composer install --no-interaction 2>/dev/null;
        php artisan key:generate --no-interaction 2>/dev/null;
        php artisan migrate --force 2>/dev/null;
        php artisan serve --host=0.0.0.0 --port=8000
      "

  # =====================
  # BASE DE DONNEES MYSQL
  # =====================
  db:
    image: mysql:8.0
    container_name: biblio-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: bibliotheque
      MYSQL_USER: biblio_user
      MYSQL_PASSWORD: biblio_pass
    volumes:
      - ./mysql-data:/var/lib/mysql

  # =====================
  # LLM LOCAL (OLLAMA)
  # =====================
  ollama:
    image: ollama/ollama:latest
    container_name: biblio-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama

  # =====================
  # PHPMYADMIN (optionnel mais pratique)
  # =====================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: biblio-phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_pass
    depends_on:
      - db